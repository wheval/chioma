name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci-cd.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci-cd.yml"

env:
  IS_PR: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-and-test:
    name: Lint, Format & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "./frontend/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: pnpm audit --audit-level=high

      - name: Run ESLint
        run: pnpm run lint

      - name: Check Prettier formatting
        run: |
          if pnpm list prettier --depth=0 | grep -q "prettier"; then
            pnpm exec prettier --check "**/*.{js,jsx,ts,tsx,json,css,md}"
          else
            echo "Prettier not installed, skipping formatting check"
          fi

      - name: Run unit tests
        continue-on-error: true
        run: |
          if pnpm list jest --depth=0 | grep -q "jest"; then
            pnpm test -- --coverage
          else
            echo "Jest not installed, skipping unit tests"
          fi

      - name: Run E2E tests
        continue-on-error: true
        run: |
          if pnpm list cypress --depth=0 | grep -q "cypress"; then
            pnpm run test:e2e
          else
            echo "Cypress not installed, skipping E2E tests"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "./frontend/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create production build
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/
          retention-days: 7

  deploy:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/

      - name: Deploy to production
        run: |
          echo "Add your deployment commands here"
          echo "For example: vercel deploy --prod"
