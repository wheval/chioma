name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - main
    tags:
      - 'v*'
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'backend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  # ============================================================================
  # TEST: Linting, Type Checking, and Unit Tests
  # ============================================================================
  test:
    runs-on: ubuntu-latest
    name: Test & Lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'backend/pnpm-lock.yaml'

      - name: Install dependencies
        run: cd backend && pnpm install --frozen-lockfile

      - name: Run pnpm audit (high severity)
        run: cd backend && pnpm audit --audit-level=high

      - name: Run ESLint
        run: cd backend && pnpm run lint

      - name: Run Prettier format check
        run: cd backend && npx prettier --check "src/**/*.ts" "test/**/*.ts"

      - name: Run TypeScript type checking
        run: cd backend && npx tsc --noEmit

      - name: Run unit tests
        run: cd backend && pnpm run test

      - name: Generate coverage report
        run: cd backend && pnpm run test:cov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

  # ============================================================================
  # E2E TESTS: Run end-to-end tests against a real PostgreSQL instance
  # ============================================================================
  e2e-tests:
    runs-on: ubuntu-latest
    name: E2E Tests
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chioma_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_TYPE: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: chioma_db_test
      JWT_SECRET: test-jwt-secret-key-for-testing-only
      JWT_REFRESH_SECRET: test-jwt-refresh-secret-key-for-testing-only
      SECURITY_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      RATE_LIMIT_TTL: 60000
      RATE_LIMIT_MAX: 100
      RATE_LIMIT_AUTH_TTL: 60000
      RATE_LIMIT_AUTH_MAX: 5
      RATE_LIMIT_STRICT_TTL: 60000
      RATE_LIMIT_STRICT_MAX: 10
      CHIOMA_CONTRACT_ID: CA3D5KRYM6CB7OWQ6TWYRR3Z4T7GNZLKERYNZGGA5SOAOPIFY6YQGAXE
      ESCROW_CONTRACT_ID: CA3D5KRYM6CB7OWQ6TWYRR3Z4T7GNZLKERYNZGGA5SOAOPIFY6YQGAXE
      DISPUTE_CONTRACT_ID: CA3D5KRYM6CB7OWQ6TWYRR3Z4T7GNZLKERYNZGGA5SOAOPIFY6YQGAXE
      RENT_OBLIGATION_CONTRACT_ID: CA3D5KRYM6CB7OWQ6TWYRR3Z4T7GNZLKERYNZGGA5SOAOPIFY6YQGAXE

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'backend/pnpm-lock.yaml'

      - name: Install dependencies
        run: cd backend && pnpm install --frozen-lockfile

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Run database migrations (safe runner)
        run: cd backend && pnpm run migration:run:safe

      - name: Run E2E tests
        run: cd backend && pnpm run test:e2e --forceExit

  # ============================================================================
  # MIGRATION ROLLBACK: verify revert + re-apply on a disposable Postgres
  # ============================================================================
  migration-rollback-verify:
    runs-on: ubuntu-latest
    name: Migration rollback verify
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chioma_migration_verify
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_TYPE: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: chioma_migration_verify

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'backend/pnpm-lock.yaml'

      - name: Install dependencies
        run: cd backend && pnpm install --frozen-lockfile

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Verify migration rollback and re-apply
        run: cd backend && bash ./scripts/test-migration-rollback.sh

  # ============================================================================
  # SECURITY: Trivy vulnerability scanning
  # ============================================================================
  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    needs: test
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-backend'

  # ============================================================================
  # API Quality Gates: OpenAPI spec, docs & contract tests
  # Optional: fails only if openapi:generate / sdk:generate scripts are added
  # ============================================================================
  api-quality:
    runs-on: ubuntu-latest
    name: API Docs & Contract
    needs: [test, e2e-tests]
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chioma
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'backend/pnpm-lock.yaml'

      - name: Install dependencies
        run: cd backend && pnpm install --frozen-lockfile

      - name: Generate OpenAPI spec
        run: cd backend && pnpm run openapi:generate 2>&1
        env:
          OPENAPI_GENERATE: "true"
          OPENAPI_OUTPUT: openapi.json
          NODE_ENV: test
          NODE_OPTIONS: "--unhandled-rejections=strict"
          RATE_LIMIT_TTL: "60000"
          RATE_LIMIT_MAX: "100"
          RATE_LIMIT_AUTH_TTL: "60000"
          RATE_LIMIT_AUTH_MAX: "5"
          RATE_LIMIT_STRICT_TTL: "60000"
          RATE_LIMIT_STRICT_MAX: "10"
          DB_TYPE: postgres
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: chioma
          JWT_SECRET: "openapi-generate-dummy-secret-not-for-production"
          SECURITY_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
          CHIOMA_CONTRACT_ID: "CA3D5KRYM6CB7OWQ6TWYRR3Z4T7GNZLKERYNZGGA5SOAOPIFY6YQGAXE"
          ESCROW_CONTRACT_ID: "CA3D5KRYM6CB7OWQ6TWYRR3Z4T7GNZLKERYNZGGA5SOAOPIFY6YQGAXE"
          DISPUTE_CONTRACT_ID: "CA3D5KRYM6CB7OWQ6TWYRR3Z4T7GNZLKERYNZGGA5SOAOPIFY6YQGAXE"
          RENT_OBLIGATION_CONTRACT_ID: "CA3D5KRYM6CB7OWQ6TWYRR3Z4T7GNZLKERYNZGGA5SOAOPIFY6YQGAXE"

      - name: Verify OpenAPI spec exists and is valid JSON
        run: |
          cd backend && node -e "const s=require('./openapi.json'); if(!s.openapi||!s.paths) throw new Error('Invalid OpenAPI'); console.log('OpenAPI', s.info?.version, 'paths:', Object.keys(s.paths).length);"

      - name: Upload OpenAPI spec artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: backend/openapi.json

      - name: Generate SDKs (TypeScript, Python)
        run: cd backend && pnpm run sdk:generate
        continue-on-error: true

      - name: Run API and integration E2E tests
        run: >
          cd backend && pnpm run test:e2e --
          test/api-docs.e2e-spec.ts
          test/api-contract.e2e-spec.ts
          test/integration.e2e-spec.ts
          test/performance.e2e-spec.ts
        env:
          NODE_ENV: test
          JWT_SECRET: "e2e-test-dummy-secret-not-for-production"
          SECURITY_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
          RATE_LIMIT_TTL: "60000"
          RATE_LIMIT_MAX: "100"
          RATE_LIMIT_AUTH_TTL: "60000"
          RATE_LIMIT_AUTH_MAX: "5"
          RATE_LIMIT_STRICT_TTL: "60000"
          RATE_LIMIT_STRICT_MAX: "10"
          DB_TYPE: postgres
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: chioma
          CHIOMA_CONTRACT_ID: "CA3D5KRYM6CB7OWQ6TWYRR3Z4T7GNZLKERYNZGGA5SOAOPIFY6YQGAXE"
          ESCROW_CONTRACT_ID: "CA3D5KRYM6CB7OWQ6TWYRR3Z4T7GNZLKERYNZGGA5SOAOPIFY6YQGAXE"
          DISPUTE_CONTRACT_ID: "CA3D5KRYM6CB7OWQ6TWYRR3Z4T7GNZLKERYNZGGA5SOAOPIFY6YQGAXE"
          RENT_OBLIGATION_CONTRACT_ID: "CA3D5KRYM6CB7OWQ6TWYRR3Z4T7GNZLKERYNZGGA5SOAOPIFY6YQGAXE"

  # ============================================================================
  # BUILD: Build the application
  # ============================================================================
  build:
    runs-on: ubuntu-latest
    name: Build
    needs: [test, security-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'backend/pnpm-lock.yaml'

      - name: Install dependencies
        run: cd backend && pnpm install --frozen-lockfile

      - name: Build application
        run: cd backend && pnpm run build

  # ============================================================================
  # DOCKER: Build and push Docker image
  # ============================================================================
  docker:
    runs-on: ubuntu-latest
    name: Build & Push Docker
    needs: [build, e2e-tests, migration-rollback-verify]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # DEPLOY: Deploy to staging or production
  # ============================================================================
  deploy-staging:
    runs-on: ubuntu-latest
    name: Deploy to Staging
    needs: docker
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'backend/pnpm-lock.yaml'

      - name: Install dependencies
        run: cd backend && pnpm install --frozen-lockfile

      - name: Build backend (for compiled data-source)
        run: cd backend && pnpm run build

      - name: Run database migrations (staging)
        if: ${{ secrets.DATABASE_URL_STAGING != '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
        run: cd backend && pnpm run migration:run:prod

      - name: Deploy to staging
        run: echo "Deploying to staging environment..."

  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://chioma-sqq1.onrender.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'backend/pnpm-lock.yaml'

      - name: Install dependencies
        run: cd backend && pnpm install --frozen-lockfile

      - name: Build backend (for compiled data-source)
        run: cd backend && pnpm run build

      - name: Run database migrations (production)
        if: ${{ secrets.DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: cd backend && pnpm run migration:run:prod

      - name: Deploy to production
        run: echo "Deploying to production environment..."

      - name: Notify deployment
        if: success()
        run: echo "Production deployment successful!"
