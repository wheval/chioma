name: Contract CI

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "contract/**"
      - ".github/workflows/contract-ci-cd.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "contract/**"
      - ".github/workflows/contract-ci-cd.yml"

env:
  IS_PR: ${{ github.event_name == 'pull_request' }}

jobs:
  contract-build:
    name: Contract build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contract
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          working-directory: contract

      - name: Cargo build
        run: cargo build --release

  contract-fmt:
    name: Contract fmt
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contract
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          working-directory: contract

      - name: Cargo format check
        run: cargo fmt --all -- --check

  contract-clippy:
    name: Contract clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contract
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          working-directory: contract

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  contract-tests:
    name: Contract tests
    runs-on: ubuntu-latest
    needs: [contract-build, contract-fmt, contract-clippy]
    defaults:
      run:
        working-directory: contract
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          working-directory: contract

      - name: Run tests
        run: cargo test --all
